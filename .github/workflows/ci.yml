name: Events-API CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
    test:
      runs-on: ubuntu-latest
      environment: production
      env:
        JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        PORT: ${{ secrets.PORT }}
        RENDER_BASE_URL: ${{ secrets.RENDER_BASE_URL }}

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Build docker image
          run: |
            docker build --platform linux/amd64 -t events-api:latest .

        - name: Run Container
          run: |
            docker run -d -p $PORT:5005 \
              -e JWT_SECRET_KEY=$JWT_SECRET_KEY \
              --name events-api-container events-api:latest
            sleep 5
            curl http://localhost:$PORT/api/health || exit 1

        - name: Setup Python
          uses: actions/setup-python@v3
          with:
            python-version: 3.11

        - name: Install dependencies
          run: |
            pip install -r requirements.txt

        - name: Run Unit test
          run: |
            pytest -v

        - name: Clean up
          if: always()
          run: |
            docker stop events-api-container || true
            docker rm events-api-container || true

        - name: login to DockerHub
          uses: docker/login-action@v2
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Tag image to Docker Hub
          run: |
             docker tag events-api:latest ${{ secrets.DOCKER_USERNAME }}/events-api:latest
             docker tag events-api:latest ${{ secrets.DOCKER_USERNAME }}/events-api:${{ github.sha }}

        - name: Push image to Docker Hub
          run: |
            docker push ${{ secrets.DOCKER_USERNAME }}/events-api:latest
            docker push ${{ secrets.DOCKER_USERNAME }}/events-api:${{ github.sha }}

        - name: Trigger Render Redeploy
          run: |
            curl -X POST ${{ secrets.RENDER_REDEPLOYMENT_HOOK }}

        - name: Wait for Render
          run: |
            sleep 30

        - name: Smoke Test
          run: |
            curl --fail ${{ secrets.RENDER_BASE_URL }}/api/health